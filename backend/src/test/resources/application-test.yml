spring:
  datasource:
    url: jdbc:h2:mem:brainquest_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret-key: TestSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong!!TestExtra
  access-expiration: 900000
  refresh-expiration: 2592000000

claude:
  api-key: test-key
  model: test-model
  max-tokens: 1024
  timeout: 5

logging:
  level:
    com.brainquest: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
