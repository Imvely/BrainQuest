spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/brainquest
    username: brainquest
    password: brainquest

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true

logging:
  level:
    com.brainquest: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
