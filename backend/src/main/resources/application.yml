spring:
  application:
    name: brainquest-api

  datasource:
    url: jdbc:postgresql://localhost:5432/brainquest
    username: brainquest
    password: brainquest
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret-key: ${JWT_SECRET:BrainQuestSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong!!}
  access-expiration: 900000        # 15분 (ms)
  refresh-expiration: 2592000000   # 30일 (ms)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: claude-sonnet-4-20250514
  max-tokens: 1024
  timeout: 30

logging:
  level:
    com.brainquest: DEBUG
    org.springframework.security: DEBUG
